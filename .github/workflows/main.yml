name: weixin

on:
  workflow_dispatch:  # 保留手动触发，方便测试
  schedule:
    # 北京时间每天16:00（下午4点） = UTC时间08:00
    # cron格式: 分 时 日 月 周
    - cron: '30 22 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai  # 强制设置时区为上海，避免时间误差
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # 解决Node.js 20警告
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11.0"
          cache: 'pip'  # 缓存pip依赖，加速安装

      - name: Set timezone to Asia/Shanghai
        run: |
          sudo cp /usr/share/zoneinfo/Asia/Shanghai /etc/localtime
          sudo timedatectl set-timezone Asia/Shanghai

      - name: Install pip packages (清华源加速+稳定版)
        run: |
          python -m pip install --upgrade pip -i https://pypi.tuna.tsinghua.edu.cn/simple --trusted-host pypi.tuna.tsinghua.edu.cn
          pip3 install requests zhdate -i https://pypi.tuna.tsinghua.edu.cn/simple --trusted-host pypi.tuna.tsinghua.edu.cn

      - name: Run weixin push
        run: |
          python3 main.py
